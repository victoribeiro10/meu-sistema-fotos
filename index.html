<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EntreClicks</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- LOGO -->
    <div class="logo-area">
        <img src="logo.png" alt="EntreClicks" class="logo">
    </div>

    <!-- BOX -->
    <div class="box">

        <h2>📸 Envie sua foto</h2>

        <p>
            Compartilhe seus melhores momentos 💖
        </p>

        <input type="file" id="file" accept="image/*">

        <button onclick="uploadImage()">
            Enviar Foto
        </button>

        <button
            id="clearBtn"
            style="display:none"
            onclick="clearGallery()">

            🗑️ Limpar Galeria

        </button>

        <button
            id="downloadBtn"
            style="display:none"
            onclick="downloadAll()">

            ⬇️ Baixar Todas

        </button>

        <div id="msg"></div>

    </div>

    <!-- GALERIA -->
    <div id="gallery"></div>

    <script src="script.js"></script>

</body>
</html>
